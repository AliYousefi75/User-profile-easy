<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <link
    href="https://cdn.jsdelivr.net/npm/remixicon@3.2.0/fonts/remixicon.css"
    rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css">
    <title>Easy User Card</title>
</head>
<body>
    <div class="container">
        <div class="card">
            <nav>
                <span><i class="ri-more-2-fill"></i></span>
            </nav>

            <img src="./assets/profile.jpg" alt="">
            <h2>Brandon Watson</h2>
            <p>UI/UX Mobile Designer</p>

            <section class="profile">
                <div class="number">
                    <h5>Projects</h5>
                    <span class="num">17</span>
                </div>
                <div class="Following">
                    <h5>Projects</h5>
                    <span class="num">159</span>
                </div>
                <div class="number">
                    <h5>Followers</h5>
                    <span class="num">205</span>
                </div>
                
            </section>

            <p class="info">
                I'm Brandon, a web developer with a passion for creating beautiful and user-friendly websites. I've worked on personal blogs to e-commerce platforms.
            </p>

            <div class="socials">
                <span class="twitter"><i class="ri-twitter-fill"></i></span>
                <span class="facebook"><i class="ri-facebook-fill"></i></span>
                <span class="gmail"><i class="ri-google-fill"></i></span>
                <span class="instagram"><i class="ri-instagram-fill"></i></span>
            </div>

            <button class="submit">View Profile</button>
        </div>
    </div>
</body>
</html>
